info:
  name: "AcsEvent POST search"
  type: http
  seq: 15

http:
  method: POST
  url: "http://{{device_host}}/ISAPI/AccessControl/AcsEvent"
  params:
    - name: "format"
      value: "json"
      type: query
  headers:
    - name: "Content-Type"
      value: "application/json"
  body:
    type: json
    data: |-
      {
          "AcsEventCond": {
            "searchID": "{{event_search_id}}",
            "searchResultPosition": {{event_search_position}},
            "maxResults": {{event_max_results}},
            "major": {{event_major}},
            "minor": {{event_minor}}
          }
        }
  auth:
    type: digest
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
