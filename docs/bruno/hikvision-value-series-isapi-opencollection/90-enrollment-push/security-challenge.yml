info:
  name: "Security challenge"
  type: http
  seq: 33

http:
  method: POST
  url: "http://{{device_host}}/ISAPI/Security/challenge"
  headers:
    - name: "Content-Type"
      value: "application/xml"
  body:
    type: xml
    data: |-
      <PublicKey xmlns="http://www.isapi.org/ver20/XMLSchema" version="2.0">
          <key>{{challenge_modulus_b64}}</key>
        </PublicKey>
  auth:
    type: digest
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
