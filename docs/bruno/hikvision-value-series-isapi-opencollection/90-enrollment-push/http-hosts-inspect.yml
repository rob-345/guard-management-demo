info:
  name: "HttpHosts inspect"
  type: http
  seq: 28

http:
  method: GET
  url: "http://{{device_host}}/ISAPI/Event/notification/httpHosts"
  params:
    - name: "security"
      value: "{{security}}"
      type: query
    - name: "iv"
      value: "{{iv}}"
      type: query
  auth:
    type: digest
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
