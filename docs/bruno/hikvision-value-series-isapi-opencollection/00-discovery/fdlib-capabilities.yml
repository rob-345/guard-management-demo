info:
  name: "FDLib capabilities"
  type: http
  seq: 8

http:
  method: GET
  url: "http://{{device_host}}/ISAPI/Intelligent/FDLib/capabilities"
  params:
    - name: "format"
      value: "json"
      type: query
  auth:
    type: digest
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
